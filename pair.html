<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>NICK MD | GREEN CONNECT</title>
  <meta name="theme-color" content="#040d08" />
  <link rel="icon" href="https://files.catbox.moe/rw2g9x.jpg">
  
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" crossorigin="anonymous" />
  <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>

  <style>
    :root {
      --primary-green: #2ecc71;
      --deep-green: #0a2e1a;
      --glass-bg: rgba(255, 255, 255, 0.07);
      --glass-border: rgba(255, 255, 255, 0.1);
      --ios-blur: blur(25px);
      --text-main: #e0f2f1;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: #040d08;
      color: var(--text-main);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      overflow: hidden;
      position: relative;
      padding: 20px;
    }

    /* Moving Particles Background */
    #particle-container {
      position: fixed;
      inset: 0;
      z-index: 0;
      background: radial-gradient(circle at center, #0d2b1a 0%, #040d08 100%);
    }

    .particle {
      position: absolute;
      background: var(--primary-green);
      border-radius: 50%;
      opacity: 0.2;
      filter: blur(8px);
      animation: float 20s linear infinite;
    }

    @keyframes float {
      0% { transform: translateY(110vh) scale(0); opacity: 0; }
      50% { opacity: 0.3; }
      100% { transform: translateY(-10vh) scale(2); opacity: 0; }
    }

    /* ── iOS NAVBAR ── */
    .navbar {
      position: fixed;
      top: 0;
      width: 100%;
      height: 60px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(0, 0, 0, 0.4);
      backdrop-filter: var(--ios-blur);
      -webkit-backdrop-filter: var(--ios-blur);
      border-bottom: 1px solid var(--glass-border);
      z-index: 1000;
    }

    .navbar .brand {
      font-weight: 800;
      font-size: 0.9rem;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: var(--primary-green);
      text-decoration: none;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    /* ── PAIR CARD ── */
    .pair-card {
      position: relative;
      z-index: 10;
      width: 100%;
      max-width: 420px;
      background: var(--glass-bg);
      backdrop-filter: var(--ios-blur);
      -webkit-backdrop-filter: var(--ios-blur);
      border: 1px solid var(--glass-border);
      border-radius: 35px;
      padding: 40px 30px;
      text-align: center;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
      animation: iosReveal 0.8s cubic-bezier(0.16, 1, 0.3, 1);
    }

    @keyframes iosReveal {
      from { opacity: 0; transform: scale(0.95) translateY(30px); }
      to { opacity: 1; transform: scale(1) translateY(0); }
    }

    h1 {
      font-weight: 800;
      font-size: 1.5rem;
      margin-bottom: 10px;
      background: linear-gradient(to right, #fff, var(--primary-green));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .desc {
      font-size: 0.85rem;
      opacity: 0.6;
      margin-bottom: 30px;
      line-height: 1.5;
    }

    /* ── INPUT STYLE ── */
    .input-group {
      text-align: left;
      margin-bottom: 20px;
    }

    label {
      font-size: 0.7rem;
      font-weight: 700;
      text-transform: uppercase;
      margin-left: 15px;
      color: var(--primary-green);
      display: block;
      margin-bottom: 8px;
    }

    input {
      width: 100%;
      padding: 16px 20px;
      border-radius: 18px;
      border: 1px solid var(--glass-border);
      background: rgba(255, 255, 255, 0.05);
      color: white;
      font-family: inherit;
      font-size: 1rem;
      outline: none;
      transition: all 0.3s ease;
    }

    input:focus {
      background: rgba(46, 204, 113, 0.1);
      border-color: var(--primary-green);
      box-shadow: 0 0 15px rgba(46, 204, 113, 0.2);
    }

    /* ── BUTTONS ── */
    .pair-btn {
      width: 100%;
      padding: 16px;
      border: none;
      background: var(--primary-green);
      color: #040d08;
      border-radius: 18px;
      font-weight: 800;
      font-size: 1rem;
      cursor: pointer;
      transition: all 0.3s ease;
      margin-bottom: 15px;
    }

    .pair-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 20px rgba(46, 204, 113, 0.3);
      filter: brightness(1.1);
    }

    .channel-link {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      color: var(--primary-green);
      text-decoration: none;
      font-size: 0.8rem;
      font-weight: 600;
      padding: 8px 16px;
      border-radius: 20px;
      background: rgba(46, 204, 113, 0.1);
      margin-bottom: 25px;
    }

    /* ── CODE OUTPUT ── */
    .code-display {
      margin-top: 10px;
      padding: 20px;
      background: rgba(0, 0, 0, 0.3);
      border-radius: 20px;
      border: 1px dashed var(--primary-green);
      cursor: pointer;
      transition: transform 0.2s;
    }

    .code-display:active { transform: scale(0.95); }

    .code-text {
      font-size: 1.8rem;
      font-weight: 800;
      letter-spacing: 4px;
      color: #fff;
      display: block;
    }

    .tap-hint {
      font-size: 0.65rem;
      text-transform: uppercase;
      opacity: 0.5;
      margin-top: 5px;
    }

    .msg { font-size: 0.85rem; font-weight: 600; margin-top: 10px; }
    .msg-wait { color: var(--primary-green); }
    .msg-error { color: #ff5e5e; }

  </style>
</head>

<body>

  <div id="particle-container"></div>

  <nav class="navbar">
    <a href="https://github.com/popkidmain" class="brand">
      <i class="fas fa-shield-halved"></i> NICK PAIR-MD
    </a>
  </nav>

  <div class="pair-card">
    <h1>LINK DEVICE</h1>
    <p class="desc">Enter your WhatsApp number including country code to generate your link code.</p>

    <div class="input-group">
      <label>Phone Number</label>
      <input type="text" id="number" placeholder="254..." />
    </div>

    <button id="submit" class="pair-btn">GENERATE CODE</button>

    <a href="https://whatsapp.com/channel/0029Vb70ySJHbFV91PNKuL3T" target="_blank" class="channel-link">
      <i class="fab fa-whatsapp"></i> Follow Channel
    </a>

    <div id="pair-output"></div>
  </div>

  <script>
    // Particle Background
    const container = document.getElementById('particle-container');
    for (let i = 0; i < 15; i++) {
      const p = document.createElement('div');
      p.className = 'particle';
      const size = Math.random() * 60 + 20 + 'px';
      p.style.width = size; p.style.height = size;
      p.style.left = Math.random() * 100 + 'vw';
      p.style.animationDuration = Math.random() * 12 + 8 + 's';
      p.style.animationDelay = Math.random() * 5 + 's';
      container.appendChild(p);
    }

    let output = document.getElementById("pair-output");
    let submitBtn = document.getElementById("submit");
    let numberInput = document.getElementById("number");

    async function CopyCode(code) {
      await navigator.clipboard.writeText(code);
      const valSpan = document.querySelector('.code-text');
      const original = valSpan.textContent;
      valSpan.textContent = "COPIED";
      setTimeout(() => { valSpan.textContent = original; }, 1000);
    }

    submitBtn.addEventListener("click", async (e) => {
      e.preventDefault();
      const num = numberInput.value.replace(/[^0-9]/g, "");

      if (num.length < 10) {
        output.innerHTML = '<p class="msg msg-error">Invalid number format</p>';
        return;
      }

      output.innerHTML = '<p class="msg msg-wait"><i class="fas fa-spinner fa-spin"></i> Linking to WhatsApp...</p>';

      try {
        let { data } = await axios.get(`/code?number=${num}`);
        let code = data.code || "ERROR";

        output.innerHTML = `
          <div class="code-display" onclick="CopyCode('${code}')">
            <span class="tap-hint">Tap to Copy</span>
            <span class="code-text">${code}</span>
          </div>
        `;
      } catch (err) {
        output.innerHTML = '<p class="msg msg-error">Connection failed. Try again.</p>';
      }
    });
  </script>

</body>
</html>
